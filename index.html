<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Instagram Profile Redirect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0; padding: 0; text-align: center;
      background-color: #fff; color: #111;
      height: 100vh; overflow: hidden;
    }
    .content {
      height: 100%; width: 100%; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 5vh 5vw;
    }
    h2 { font-size: 1.8rem; margin-bottom: 1rem; }
    p { font-size: 1rem; margin: 0.5rem 0 1rem; }
    .gif { width: 80%; max-width: 300px; margin: 1rem 0; }
    .arrow {
      position: absolute; top: 2vh; right: 2vw;
      width: 40px; height: auto; animation: bounce 1s infinite; z-index: 10;
    }
    .btn {
      margin-top: 20px; padding: 16px 40px; font-size: 1.2rem; font-weight: bold;
      color: #fff; background-color: #0088cc; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s; width: 80%; max-width: 300px;
    }
    @keyframes bounce {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    @media (max-width: 360px) {
      h2 { font-size: 1.4rem; } p { font-size: 0.9rem; } .gif { width: 90%; }
    }
  </style>
</head>
<body>
  <div class="content">
    <img class="arrow" src="assets/png/1.png" alt="arrow" />
    
    <div style="padding: 20px; font-family: sans-serif; text-align: center;">
      <h2>Open in browser</h2>
      <p>You are inside an in-app browser.<br>Please tap <b>⋮</b> or <b>⋯</b> above and choose<br><b>"Open in browser"</b>.</p>
      <img class="gif" src="assets/gif/1.gif" alt="animation" style="width: 80%; max-width: 300px;" />
      <img class="arrow" src="assets/png/1.png" alt="arrow" style="position: absolute; top: 2vh; right: 2vw; width: 40px;" />
    </div>
    
    
    <button id="continue-btn" class="btn" style="display: none;">Continue</button>
  </div>

  <script src="assets/js/webview.js?v=4"></script>
</body>
</html>
